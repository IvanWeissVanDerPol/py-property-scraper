# Paraguayan Property Sources Configuration
# Each source defines search URLs, rate limits, and scraping strategy.

sources:
  - name: clasipar
    display_name: Clasipar
    base_url: https://clasipar.paraguay.com
    search_urls:
      - /venta/casas
      - /venta/departamentos
      - /venta/terrenos
      - /venta/locales
    enabled: true
    rate_limit_delay: 1.5
    requires_js: false
    requires_auth: false
    max_pages: 100

  - name: infocasas
